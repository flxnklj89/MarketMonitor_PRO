name: Update Marktrisiko-Kompass Data

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: marktrisiko-kompass-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate secret
        run: |
          if [ -z "${{ secrets.FRED_API_KEY }}" ]; then
            echo "FRED_API_KEY is missing. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Fetch macro data and PRO metadata
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "data: update $(date -u +%Y-%m-%dT%H:%MZ)"
          BRANCH="${GITHUB_REF_NAME:-main}"
          git pull --rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"
